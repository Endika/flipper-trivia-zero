# Release assets are only built when release-please opens a GitHub Release
# (release_created == true). The pack is regenerated from data/blacklist.txt
# + the OpenTDB cache before compiling so the .fap ships with content
# matching the source at release time.

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.release_created }}

      - name: Set up Python
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pipeline deps
        if: ${{ steps.release.outputs.release_created }}
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements-dev.txt

      - name: Generate embedded pack
        if: ${{ steps.release.outputs.release_created }}
        env:
          TZ_TRANSLATOR: ${{ vars.TZ_TRANSLATOR || 'stub' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: cd tools && python build_pack.py

      - name: Build FAP
        id: ufbt
        if: ${{ steps.release.outputs.release_created }}
        uses: flipperdevices/flipperzero-ufbt-action@v0.1
        with:
          sdk-channel: dev

      - name: Upload FAP to release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          faps=(dist/*.fap)
          if [ ${#faps[@]} -eq 0 ]; then
            echo "::error::No .fap in dist/. ufbt output was:"
            echo "${{ steps.ufbt.outputs.fap-artifacts }}"
            ls -la dist/ 2>&1 || true
            find . -name '*.fap' -print 2>/dev/null || true
            exit 1
          fi
          gh release upload "${{ steps.release.outputs.tag_name }}" "${faps[@]}"
